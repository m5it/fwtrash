NAME:fwtrash
ENTRY:v2/src/fwtrash/cli/main.py
MODULE:fwtrash.cli.main
SUBCOMMAND:run
PYTHONPATH:v2/src
DESCRIPTION:Modern security log analyzer with real-time threat detection and automatic IP blocking
PCA_ON_NONE_HELP:true

ARG:VERBOSE:-v:--verbose:false
ARG:QUIET:-q:--quiet:false
ARG:RULES:-P:--rules:true
ARG:PARSER:-p:--parser:true
ARG:BADIPS:-o:--badips:true
ARG:TRASH:-O:--trash:true
ARG:ALLOWED:-a:--allowed:true
ARG:COMMAND:-c:--command:true
ARG:DRY_RUN:-n:--dry-run:false
ARG:STAT_KEYS:-s:--stat-keys:true
ARG:STAT_TEMPLATE:-S:--stat-template:true
ARG:DISABLE_STATS:-d:--disable-stats:false
ARG:STOP_NEXT_DAY:-D:--stop-next-day:false
ARG:AUTOSAVE::--autosave:true
ARG:DASHBOARD::--dashboard:false
ARG:DASHBOARD_PORT::--dashboard-port:true
ARG:LEGACY_MODE::--legacy-mode:false
ARG:VERSION:-V:--version:false
